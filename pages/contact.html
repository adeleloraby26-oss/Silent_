<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — SILENT_</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
</head>
<body>
<div id="loader"><div class="loader-logo">SILENT<span>_</span></div><div class="loader-bar"></div></div>
<div id="nav-root"></div>

<main style="padding-top:var(--nav-height);">
  <div class="s-section" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-xl);" id="contact-grid">
    <div data-reveal="left">
      <span class="s-eyebrow">Get In Touch</span>
      <h1 class="s-heading" style="margin:16px 0 32px;font-size:clamp(32px,5vw,64px);">Contact Us</h1>
      <p class="s-body" style="margin-bottom:48px;max-width:440px;">Have a question about an order, a product, or just want to say hello? Our team typically responds within 24 hours.</p>

      <div style="display:flex;flex-direction:column;gap:24px;" id="contact-info"></div>
    </div>

    <div data-reveal="right">
      <form id="contact-form">
        <div class="s-field">
          <label for="c-name">Name</label>
          <input type="text" id="c-name" class="s-input" placeholder="Your name" required>
        </div>
        <div class="s-field" style="margin-top:20px;">
          <label for="c-email">Email</label>
          <input type="email" id="c-email" class="s-input" placeholder="your@email.com" required>
        </div>
        <div class="s-field" style="margin-top:20px;">
          <label for="c-subject">Subject</label>
          <select id="c-subject" class="s-input s-select">
            <option>Order Inquiry</option>
            <option>Product Question</option>
            <option>Returns & Exchanges</option>
            <option>Wholesale Inquiry</option>
            <option>Other</option>
          </select>
        </div>
        <div class="s-field" style="margin-top:20px;">
          <label for="c-message">Message</label>
          <textarea id="c-message" class="s-input" rows="6" placeholder="How can we help?" style="resize:vertical;" required></textarea>
        </div>
        <p id="contact-success" style="display:none;color:var(--success);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;margin-top:16px;" role="status">Message sent. We'll be in touch soon.</p>
        <button type="submit" class="s-btn s-btn--primary s-btn--full" style="padding:20px;margin-top:24px;">Send Message</button>
      </form>
    </div>
  </div>
</main>

<div id="footer-root"></div>

<script type="module">
  import { renderNav, renderFooter } from '/assets/js/components.js';
  import { initNav, initCart, initSearch, loadSiteSettings } from '/assets/js/nav.js';
  import { initCursor, initScrollReveal, initPageTransitions, initLoadingScreen, initWhatsAppButton } from '/assets/js/utils.js';
  import { supabase } from '/assets/js/supabase.js';

  document.getElementById('nav-root').innerHTML = renderNav('');
  loadSiteSettings().then(s => {
    document.getElementById('footer-root').innerHTML = renderFooter(s);
    const waBtn = document.getElementById('whatsapp-float');
    if (waBtn && s.whatsapp_url) waBtn.href = s.whatsapp_url;

    document.getElementById('contact-info').innerHTML = `
      ${s.support_email ? `<div><div style="font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">Email</div><a href="mailto:${s.support_email}" style="font-size:14px;color:var(--text-secondary);">${s.support_email}</a></div>` : ''}
      ${s.phone ? `<div><div style="font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">Phone</div><a href="tel:${s.phone}" style="font-size:14px;color:var(--text-secondary);">${s.phone}</a></div>` : ''}
      ${s.store_address ? `<div><div style="font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">Address</div><p style="font-size:14px;color:var(--text-secondary);">${s.store_address}</p></div>` : ''}
    `;
  });
  initLoadingScreen(); initCursor(); initScrollReveal(); initPageTransitions(); initNav(); initCart(); initSearch(); initWhatsAppButton();

  if (window.innerWidth < 768) document.getElementById('contact-grid').style.gridTemplateColumns = '1fr';

  document.getElementById('contact-form')?.addEventListener('submit', async e => {
    e.preventDefault();
    const name = document.getElementById('c-name').value.trim();
    const email = document.getElementById('c-email').value.trim();
    const subject = document.getElementById('c-subject').value;
    const message = document.getElementById('c-message').value.trim();

    // In production, send to an Edge Function or insert into a 'contact_messages' table
    console.log('Contact form submission:', { name, email, subject, message });

    document.getElementById('contact-success').style.display = 'block';
    e.target.reset();
  });
</script>
</body>
</html>
