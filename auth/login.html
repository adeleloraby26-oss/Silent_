<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SILENT_</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/auth.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
</head>
<body>
<div id="loader"><div class="loader-logo">SILENT<span>_</span></div><div class="loader-bar"></div></div>

<div class="auth-page">
  <div class="auth-brand">
    <a href="/index.html" class="auth-brand__logo">SILENT<span>_</span></a>
    <div class="auth-brand__visual" aria-hidden="true"></div>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-form-inner">
      <span class="s-eyebrow" style="display:block;margin-bottom:16px;">Welcome Back</span>
      <h1 class="s-subheading" style="margin-bottom:40px;">Sign In</h1>

      <div class="s-field">
        <label for="email">Email</label>
        <input type="email" id="email" class="s-input" placeholder="your@email.com" autocomplete="email" required>
      </div>

      <div class="s-field" style="margin-top:16px;position:relative;">
        <label for="password">Password</label>
        <input type="password" id="password" class="s-input" placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" id="toggle-pw" class="auth-pw-toggle" aria-label="Toggle password visibility">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <div style="display:flex;justify-content:flex-end;margin-top:12px;">
        <a href="/auth/forgot.html" class="auth-link" style="font-size:11px;">Forgot password?</a>
      </div>

      <p id="auth-error" style="display:none;color:var(--error);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;margin-top:16px;" role="alert"></p>

      <button id="login-btn" class="s-btn s-btn--primary s-btn--full" style="padding:20px;margin-top:var(--spacing-md);">Sign In</button>

      <div class="auth-divider"><span>or</span></div>

      <button id="google-btn" class="s-btn s-btn--full" style="padding:18px;gap:12px;">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <p class="auth-switch">Don't have an account? <a href="/auth/register.html" class="auth-link">Create one</a></p>
    </div>
  </div>
</div>

<script type="module">
  import { initCursor, initLoadingScreen } from '/assets/js/utils.js';
  import { supabase, getCurrentUser } from '/assets/js/supabase.js';

  initLoadingScreen(); initCursor();

  // Redirect if already logged in
  getCurrentUser().then(user => {
    if (user) window.location.href = '/auth/profile.html';
  });

  // Password toggle
  document.getElementById('toggle-pw')?.addEventListener('click', () => {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  // Enter key
  document.addEventListener('keypress', e => {
    if (e.key === 'Enter') document.getElementById('login-btn')?.click();
  });

  document.getElementById('login-btn')?.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('auth-error');
    const btn = document.getElementById('login-btn');

    if (!email || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errEl.style.display = 'none';

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errEl.textContent = error.message === 'Invalid login credentials'
        ? 'Invalid email or password.' : error.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    } else {
      const redirect = new URLSearchParams(window.location.search).get('redirect') || '/auth/profile.html';
      window.location.href = redirect;
    }
  });

  document.getElementById('google-btn')?.addEventListener('click', async () => {
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: `${window.location.origin}/auth/profile.html` }
    });
  });
</script>
</body>
</html>
