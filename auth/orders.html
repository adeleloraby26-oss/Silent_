<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order History — SILENT_</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/profile.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
</head>
<body>
<div id="loader"><div class="loader-logo">SILENT<span>_</span></div><div class="loader-bar"></div></div>
<div id="nav-root"></div>

<main style="padding-top:var(--nav-height);min-height:80vh;">
  <div class="s-section">
    <h1 class="s-heading" style="margin-bottom:var(--spacing-lg);" data-reveal>Order History</h1>
    <div id="orders-list"></div>
    <div id="orders-empty" style="display:none;text-align:center;padding:var(--spacing-2xl) 0;">
      <p class="s-eyebrow">No orders yet</p>
      <a href="/pages/shop.html" class="s-btn" style="margin-top:32px;">Start Shopping</a>
    </div>
  </div>
</main>

<div id="footer-root"></div>

<script type="module">
  import { renderNav, renderFooter } from '/assets/js/components.js';
  import { initNav, initCart, initSearch, loadSiteSettings } from '/assets/js/nav.js';
  import { initCursor, initScrollReveal, initPageTransitions, initLoadingScreen, formatPrice } from '/assets/js/utils.js';
  import { supabase, requireAuth } from '/assets/js/supabase.js';

  document.getElementById('nav-root').innerHTML = renderNav('');
  loadSiteSettings().then(s => document.getElementById('footer-root').innerHTML = renderFooter(s));
  initLoadingScreen(); initCursor(); initScrollReveal(); initPageTransitions(); initNav(); initCart(); initSearch();

  const user = await requireAuth('/auth/login.html?redirect=/auth/orders.html');
  if (!user) throw new Error('Not authenticated');

  const { data: orders } = await supabase
    .from('orders')
    .select('*, order_items(*)')
    .eq('user_id', user.id)
    .order('created_at', { ascending: false });

  const listEl = document.getElementById('orders-list');
  const emptyEl = document.getElementById('orders-empty');

  if (!orders?.length) {
    emptyEl.style.display = 'block';
  } else {
    listEl.innerHTML = orders.map(o => `
      <div class="admin-card" style="background:var(--bg-card);border:1px solid var(--border);padding:24px;margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
          <div>
            <div style="font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;">Order #${o.id.slice(0,8).toUpperCase()}</div>
            <div style="font-size:12px;color:var(--text-secondary);">${new Date(o.created_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
          </div>
          <span class="order-status--${o.status}" style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;">${o.status}</span>
        </div>
        <div style="border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:16px 0;margin-bottom:16px;">
          ${(o.order_items || []).map(item => `
            <div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;color:var(--text-secondary);">
              <span>${item.name} (${item.size}) × ${item.quantity}</span>
              <span>${formatPrice(item.price * item.quantity)}</span>
            </div>
          `).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:14px;">${formatPrice(o.total)}</span>
          <a href="/pages/order-confirmation.html?id=${o.id}" class="s-btn" style="padding:10px 20px;font-size:10px;">View Details</a>
        </div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
