<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — SILENT_</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/auth.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
</head>
<body>
<div id="loader"><div class="loader-logo">SILENT<span>_</span></div><div class="loader-bar"></div></div>

<div class="auth-page">
  <div class="auth-brand">
    <a href="/index.html" class="auth-brand__logo">SILENT<span>_</span></a>
    <div class="auth-brand__visual"></div>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-form-inner">
      <span class="s-eyebrow" style="display:block;margin-bottom:16px;">Account Recovery</span>
      <h1 class="s-subheading" style="margin-bottom:24px;">Reset Password</h1>
      <p class="s-body" style="margin-bottom:32px;font-size:13px;">Enter your email and we'll send you a link to reset your password.</p>

      <div class="s-field">
        <label for="email">Email</label>
        <input type="email" id="email" class="s-input" placeholder="your@email.com" autocomplete="email" required>
      </div>

      <p id="reset-msg" style="display:none;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;margin-top:16px;" role="status"></p>

      <button id="reset-btn" class="s-btn s-btn--primary s-btn--full" style="padding:20px;margin-top:var(--spacing-md);">Send Reset Link</button>

      <p class="auth-switch">Remember your password? <a href="/auth/login.html" class="auth-link">Sign in</a></p>
    </div>
  </div>
</div>

<script type="module">
  import { initCursor, initLoadingScreen } from '/assets/js/utils.js';
  import { supabase } from '/assets/js/supabase.js';

  initLoadingScreen(); initCursor();

  document.getElementById('reset-btn')?.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const msg = document.getElementById('reset-msg');
    const btn = document.getElementById('reset-btn');

    if (!email) {
      msg.style.color = 'var(--error)'; msg.textContent = 'Please enter your email.'; msg.style.display = 'block'; return;
    }

    btn.disabled = true; btn.textContent = 'Sending...';

    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: `${window.location.origin}/auth/reset-password.html`
    });

    msg.style.display = 'block';
    if (error) {
      msg.style.color = 'var(--error)'; msg.textContent = error.message;
      btn.disabled = false; btn.textContent = 'Send Reset Link';
    } else {
      msg.style.color = 'var(--success)';
      msg.textContent = 'Check your email for a reset link.';
      btn.textContent = 'Email Sent';
    }
  });

  document.addEventListener('keypress', e => {
    if (e.key === 'Enter') document.getElementById('reset-btn')?.click();
  });
</script>
</body>
</html>
