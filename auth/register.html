<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — SILENT_</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/auth.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
</head>
<body>
<div id="loader"><div class="loader-logo">SILENT<span>_</span></div><div class="loader-bar"></div></div>

<div class="auth-page">
  <div class="auth-brand">
    <a href="/index.html" class="auth-brand__logo">SILENT<span>_</span></a>
    <div class="auth-brand__visual"></div>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-form-inner">
      <span class="s-eyebrow" style="display:block;margin-bottom:16px;">Join the Inner Circle</span>
      <h1 class="s-subheading" style="margin-bottom:40px;">Create Account</h1>

      <div class="form-grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="s-field">
          <label for="first-name">First Name</label>
          <input type="text" id="first-name" class="s-input" placeholder="First" autocomplete="given-name" required>
        </div>
        <div class="s-field">
          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" class="s-input" placeholder="Last" autocomplete="family-name" required>
        </div>
      </div>

      <div class="s-field" style="margin-top:16px;">
        <label for="email">Email</label>
        <input type="email" id="email" class="s-input" placeholder="your@email.com" autocomplete="email" required>
      </div>

      <div class="s-field" style="margin-top:16px;position:relative;">
        <label for="password">Password</label>
        <input type="password" id="password" class="s-input" placeholder="Min 8 characters" autocomplete="new-password" required minlength="8">
        <button type="button" id="toggle-pw" class="auth-pw-toggle" aria-label="Toggle password visibility">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <label class="checkout-checkbox" style="margin-top:20px;display:flex;align-items:flex-start;gap:12px;font-size:11px;color:var(--text-secondary);">
        <input type="checkbox" id="newsletter-opt" checked style="width:14px;height:14px;border:1px solid var(--border);appearance:none;-webkit-appearance:none;background:transparent;flex-shrink:0;margin-top:2px;position:relative;transition:all .2s;">
        <span>Receive early access to new drops and exclusive offers</span>
      </label>

      <p id="auth-error" style="display:none;color:var(--error);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;margin-top:16px;" role="alert"></p>
      <p id="auth-success" style="display:none;color:var(--success);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;margin-top:16px;" role="status"></p>

      <button id="register-btn" class="s-btn s-btn--primary s-btn--full" style="padding:20px;margin-top:var(--spacing-md);">Create Account</button>

      <div class="auth-divider"><span>or</span></div>

      <button id="google-btn" class="s-btn s-btn--full" style="padding:18px;gap:12px;">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <p class="auth-switch">Already have an account? <a href="/auth/login.html" class="auth-link">Sign in</a></p>
    </div>
  </div>
</div>

<script type="module">
  import { initCursor, initLoadingScreen } from '/assets/js/utils.js';
  import { supabase, getCurrentUser } from '/assets/js/supabase.js';

  initLoadingScreen(); initCursor();

  getCurrentUser().then(u => { if (u) window.location.href = '/auth/profile.html'; });

  document.getElementById('toggle-pw')?.addEventListener('click', () => {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  // Style newsletter checkbox
  const nlCb = document.getElementById('newsletter-opt');
  nlCb?.addEventListener('change', () => {
    nlCb.style.background = nlCb.checked ? '#fff' : 'transparent';
    nlCb.style.borderColor = nlCb.checked ? '#fff' : '';
  });

  document.getElementById('register-btn')?.addEventListener('click', async () => {
    const firstName = document.getElementById('first-name').value.trim();
    const lastName = document.getElementById('last-name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const newsletter = document.getElementById('newsletter-opt').checked;
    const errEl = document.getElementById('auth-error');
    const succEl = document.getElementById('auth-success');
    const btn = document.getElementById('register-btn');

    if (!firstName || !lastName || !email || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.style.display = 'block'; succEl.style.display = 'none'; return;
    }
    if (password.length < 8) {
      errEl.textContent = 'Password must be at least 8 characters.';
      errEl.style.display = 'block'; succEl.style.display = 'none'; return;
    }

    btn.disabled = true; btn.textContent = 'Creating account...';
    errEl.style.display = 'none'; succEl.style.display = 'none';

    const { data, error } = await supabase.auth.signUp({
      email, password,
      options: { data: { full_name: `${firstName} ${lastName}`, newsletter } }
    });

    if (error) {
      errEl.textContent = error.message; errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Create Account';
    } else if (data.user && !data.session) {
      succEl.textContent = 'Check your email to confirm your account.';
      succEl.style.display = 'block';
      btn.textContent = 'Email Sent';
    } else {
      if (newsletter) await supabase.from('newsletter').upsert({ email });
      window.location.href = '/auth/profile.html';
    }
  });

  document.getElementById('google-btn')?.addEventListener('click', async () => {
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: `${window.location.origin}/auth/profile.html` }
    });
  });
</script>
</body>
</html>
